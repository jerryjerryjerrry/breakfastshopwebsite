<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 - 南興城早餐店</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-top: 2rem;
        }
        .contact-info {
            background-color: var(--color-white);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            height: 100%;
        }
        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .info-icon {
            font-size: 1.5rem;
            color: var(--color-primary);
            background-color: var(--color-bg-alt);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .info-text h4 {
            margin-bottom: 0.5rem;
            color: var(--color-secondary);
        }
        .info-text p {
            color: var(--color-text-light);
            margin-bottom: 0;
        }
        .contact-form {
            background-color: var(--color-white);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-secondary);
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.2);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }
        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo-container">
                <div class="logo-icon">南</div>
                <div class="logo-text">南興城早餐店</div>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">主頁</a></li>
                    <li><a href="menu.html">菜單</a></li>
                    <li><a href="about.html">關於南興城</a></li>
                    <li><a href="service.html">訂購服務</a></li>
                    <li><a href="contact.html" class="active">聯絡我們</a></li>
                    <li><a href="order.html" class="nav-cta">線上點餐</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="section container">
        <h1 class="section-title">聯絡我們</h1>
        
        <div class="contact-grid">
            <div class="contact-info">
                <h3 style="margin-bottom: 2rem; color: var(--color-secondary);">店家資訊</h3>
                
                <div class="info-item">
                    <div class="info-icon">📍</div>
                    <div class="info-text">
                        <h4>地址</h4>
                        <p>600嘉義市東區頂寮里南興路165號</p>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">📞</div>
                    <div class="info-text">
                        <h4>預約專線</h4>
                        <p>05-2229618</p>
                        <p>0972-018506</p>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">⏰</div>
                    <div class="info-text">
                        <h4>營業時間</h4>
                        <p>週一至週日：05:30 - 13:00</p>
                        <p>(如有公休將於店內或粉絲專頁公告)</p>
                    </div>
                </div>
            </div>

            <div class="contact-form">
                <h3 style="margin-bottom: 2rem; color: var(--color-secondary);">留言給我們</h3>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" class="form-control" placeholder="您的姓名" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">電話</label>
                        <input type="tel" id="phone" class="form-control" placeholder="您的聯絡電話">
                    </div>
                    <div class="form-group">
                        <label for="message">留言內容</label>
                        <textarea id="message" class="form-control" placeholder="有什麼想告訴我們的嗎？" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">送出留言</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 南興城有氧早餐店. All rights reserved.</p>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
